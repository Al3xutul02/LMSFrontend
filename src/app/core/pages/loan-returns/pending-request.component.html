<div class="pending-requests">
  <h2>Pending Requests</h2>

  <div *ngIf="loading" class="state-msg">Loading...</div>
  <div *ngIf="error" class="state-msg error">{{ error }}</div>
  <div *ngIf="!loading && !error && requests.length === 0" class="state-msg">
    No pending requests.
  </div>

  <div class="request-card" *ngFor="let req of requests">
    <div class="request-header">
      <span class="request-id">Request #{{ req.id }}</span>
      <span class="badge badge-pending">Pending</span>
    </div>

    <div class="request-details">
      <div><span class="label">Requester:</span> {{ req.requesterName }}</div>
      <div><span class="label">Book:</span> {{ req.bookTitle }} (ISBN: {{ req.bookISBN }})</div>
      <div><span class="label">Count:</span> {{ req.count }}</div>
      <div><span class="label">Requested on:</span> {{ req.requestDate | date:'mediumDate' }}</div>
    </div>

    <div class="request-actions">
      <button class="btn-finish" (click)="finish(req.id)">Finish</button>
      <button class="btn-reject" (click)="reject(req.id)">Reject</button>
    </div>
  </div>
</div>
