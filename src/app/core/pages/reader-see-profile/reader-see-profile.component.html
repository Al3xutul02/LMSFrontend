<div class="profile-page">
  <aside class="sidebar">
    <div class="user-card">
      <div class="profile-photo-container">
        <img src="assets/profile-placeholder.png" alt="Profile Photo" class="profile-photo">
      </div>
      <h2 class="user-full-name">{{ userProfile?.name }}</h2>
      <div class="borrowing-stats">
        <div class="stat-item box-stat">
          <span class="stat-label">Books to Return</span>
          <span class="stat-number">{{ loanBookEntries.length }}</span>
        </div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <section class="account-header">
      <h1>My Account</h1>
    </section>

    <div class="info-block">
      <div class="block-header">
        <h3>Books to Return</h3>
        <button class="favorite-toggle" (click)="toggleFavoriteGenre()">
          <i [class]="isFavorite ? 'fas fa-star' : 'far fa-star'"></i>
        </button>
      </div>

     <div class="return-list">
  <div class="list-row" 
       *ngFor="let entry of loanBookEntries"
       (mouseenter)="onMouseEnter(entry.fullDetails)"
       (mouseleave)="onMouseLeave()"
       (mousemove)="onMouseMove($event)"> <div class="book-info">
      <span class="book-title"><strong>{{ entry.title }}</strong></span>
      <span class="book-author" *ngIf="entry.author"> de {{ entry.author }}</span>
    </div>

    <span class="due-date" [class.overdue]="isOverdue(entry.dueDate)">
      {{ entry.dueDate | date:'MMMM d, yyyy' }}
    </span>
  </div>

  <div class="popover-tracking-container" 
       *ngIf="hoveredBook"
       [style.left.px]="popoverPos.x"
       [style.top.px]="popoverPos.y">
    <book-details [bookDto]="hoveredBook"></book-details>
  </div>
</div>
    </div>

    <div class="personalization-block">
      <h3>Borrow More Books</h3>
      <div class="recommendations-grid">
        <div class="rec-card" *ngFor="let book of recommendations">
          <img [src]="book.coverUrl" alt="Cover" class="rec-cover">
          <div class="rec-details">
            <h4>{{ book.title }}</h4>
            <p>{{ book.author }}</p>
            <button class="btn-borrow-sm">Borrow</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
