<div class="dashboard-layout">
  <aside class="dash-sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Admin</span>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item" [class.active]="activePage === 'branches'" (click)="setPage('branches')">
        <span class="nav-label">Branches</span>
      </button>
      <button class="nav-item" [class.active]="activePage === 'users'" (click)="setPage('users')">
        <span class="nav-label">Users</span>
      </button>
    </nav>
  </aside>

  <main class="dash-content">
    @if (activePage === 'branches') {
      <branches-page></branches-page>
    }
    @if (activePage === 'users') {
      <users-page></users-page>
    }
  </main>
</div>
