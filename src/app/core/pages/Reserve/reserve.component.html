<div class="modal-wrapper theme-default">
  <div class="modal-header">
    <div class="header-left">
      <span>Request Details</span>
    </div>
    <div class="header-right">
      <span style="margin-right: 15px; font-size: 14px;">Pending</span>
      <button class="close-btn" (click)="close()">&times;</button>
    </div>
  </div>

  <div class="modal-body">
    <aside class="book-sidebar">
      <div class="book-cover">
      <!--  <img [src]="book.coverImageUrl || 'assets/no-cover.png'" alt="Cover"> -->
      </div>
      <div class="meta-details">
        <div class="meta-item"><strong>Author:</strong> {{ book.author }}</div>
        <div class="meta-item"><strong>ISBN:</strong> {{ book.isbn }}</div>
      </div>
    </aside>

    <main class="book-content">
      <h1 class="book-title">{{ book.title }}</h1>
      
      <section class="description-box">
        <h3>Description</h3>
        <p>{{ book.description }}</p>
      </section>

      <div class="info-grid">
        <div class="grid-cell"><strong>Loan Duration:</strong> 14 days</div>
      </div>

      <div class="reserve-action-card">
        <h2 class="reserve-title">Rezervă Cartea</h2>
        <label style="font-size: 11px; font-weight: 800; color: var(--accent); display: block; margin-top: 20px;">DATA RIDICĂRII</label>
        <input type="date" [(ngModel)]="pickupDate" class="date-picker">
        
        <button class="confirm-btn" (click)="confirmReservation()">
          Confirmă Rezervarea
        </button>
      </div>
    </main>
  </div>
</div>
