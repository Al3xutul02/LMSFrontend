<div class="add-book">
  <h2>Add New Books</h2>

  <div *ngIf="successMessage" class="state-msg success">{{ successMessage }}</div>
  <div *ngIf="errorMessage" class="state-msg error">{{ errorMessage }}</div>

  <form (ngSubmit)="submit()" #bookForm="ngForm">
    <div class="form-group">
      <label for="title">Title:</label>
      <input id="title" type="text" [(ngModel)]="title" name="title" />
    </div>

    <div class="form-group">
      <label for="author">Author:</label>
      <input id="author" type="text" [(ngModel)]="author" name="author" />
    </div>

    <div class="form-group">
      <label for="quantity">Quantity:</label>
      <input id="quantity" type="number" [(ngModel)]="quantity" name="quantity" min="1" />
    </div>

    <button type="submit" [disabled]="submitting" class="btn-add">Add Book</button>
  </form>
</div>
