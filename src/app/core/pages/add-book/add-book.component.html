<div class="add-book-container">

  <!-- Page Header -->
  <div class="page-header">
    <div class="header-icon">📖</div>
    <div>
      <h2>Add New Book</h2>
      <p class="header-subtitle">Fill in the details to register a new title in the library</p>
    </div>
  </div>

  <!-- Toast Messages -->
  <div *ngIf="successMessage" class="toast toast-success">
    <span class="toast-icon">✓</span> {{ successMessage }}
  </div>
  <div *ngIf="errorMessage" class="toast toast-error">
    <span class="toast-icon">!</span> {{ errorMessage }}
  </div>

  <!-- Form Card -->
  <div class="form-card">
    <form (ngSubmit)="submit()" #bookForm="ngForm" novalidate>

      <!-- Two-column row: ISBN + Status -->
      <div class="form-row">
        <div class="field">
          <label for="isbn">ISBN</label>
          <input id="isbn" type="number" [(ngModel)]="isbn" name="isbn" min="0" placeholder="e.g. 9780141439518" />
        </div>
        <div class="field">
          <label for="status">Availability</label>
          <select id="status" [(ngModel)]="status" name="status">
            <option *ngFor="let s of statusOptions" [value]="s.value">{{ s.label }}</option>
          </select>
        </div>
      </div>

      <!-- Title -->
      <div class="field">
        <label for="title">Title <span class="required">*</span></label>
        <input id="title" type="text" [(ngModel)]="title" name="title"
               placeholder="e.g. The Great Gatsby" required />
      </div>

      <!-- Author -->
      <div class="field">
        <label for="author">Author <span class="required">*</span></label>
        <input id="author" type="text" [(ngModel)]="author" name="author"
               placeholder="e.g. F. Scott Fitzgerald" required />
      </div>

      <!-- Description -->
      <div class="field">
        <label for="description">Description</label>
        <textarea id="description" [(ngModel)]="description" name="description"
                  rows="3" placeholder="Brief summary of the book…"></textarea>
      </div>

      <!-- Quantity -->
      <div class="field field-narrow">
        <label for="count">Quantity <span class="required">*</span></label>
        <div class="qty-control">
          <button type="button" class="qty-btn" (click)="count = count > 1 ? count - 1 : 1">−</button>
          <input id="count" type="number" [(ngModel)]="count" name="count" min="1" />
          <button type="button" class="qty-btn" (click)="count = count + 1">+</button>
        </div>
      </div>

      <!-- Genres -->
      <div class="field">
        <label>Genres <span class="field-hint">(select all that apply)</span></label>
        <div class="genre-grid">
          <button
            type="button"
            *ngFor="let genre of allGenres"
            class="genre-pill"
            [class.selected]="isGenreSelected(genre)"
            (click)="toggleGenre(genre)">
            {{ formatGenre(genre) }}
          </button>
        </div>
        <p *ngIf="selectedGenres.length > 0" class="genre-count">
          {{ selectedGenres.length }} genre{{ selectedGenres.length > 1 ? 's' : '' }} selected
        </p>
      </div>

      <!-- Actions -->
      <div class="form-actions">
        <button type="button" class="btn-reset" (click)="reset()" [disabled]="submitting">
          Clear
        </button>
        <button type="submit" class="btn-submit" [disabled]="submitting">
          <span *ngIf="submitting" class="btn-spinner"></span>
          <span *ngIf="!submitting">＋</span>
          {{ submitting ? 'Adding…' : 'Add Book' }}
        </button>
      </div>

    </form>
  </div>

</div>
